name: Supabase Keepalive

on:
  schedule:
    # Runs every 5 days at 06:00 UTC
    - cron: '0 6 */5 * *'
  workflow_dispatch: # Allow manual trigger if needed

jobs:
  keepalive:
    name: Ping portfolio_embeddings
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase SDK
        run: npm install @supabase/supabase-js

      # Uses the Supabase JS SDK (not raw curl) to establish a real client
      # connection. Supabase's auto-pause monitor tracks SDK connections as
      # activity but does NOT count stateless PostgREST HTTP calls (curl).
      - name: Ping Supabase via SDK
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          node --input-type=module -e "
            import { createClient } from '@supabase/supabase-js';
            const sb = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_ANON_KEY);
            const { data, error } = await sb.from('portfolio_embeddings').select('id').limit(1);
            if (error) { console.error('Keepalive failed:', error.message); process.exit(1); }
            console.log('Keepalive ping sent — Supabase project remains active.');
          "
